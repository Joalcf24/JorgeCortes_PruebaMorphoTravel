<header class="app-header border-bottom">
	<div class="container-fluid px-4 py-3">
		<div class="d-flex align-items-center justify-content-between gap-3">
			<img src="assets/images/logo.png" alt="Logo" class="header-logo" />
			<div class="d-flex align-items-center gap-3">
				<div class="d-flex align-items-center gap-2 text-body-secondary">
					<i class="bi bi-person-circle"></i>
					<span class="fw-semibold text-body">{{ userDisplayName }}</span>
				</div>
				<button type="button" class="btn btn-outline-dark btn-sm d-flex align-items-center gap-2" (click)="logout()">
					<i class="bi bi-box-arrow-right"></i>
					<span>Cerrar sesi&oacute;n</span>
				</button>
			</div>
		</div>
	</div>
</header>
