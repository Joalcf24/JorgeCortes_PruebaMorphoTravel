<section class="login-page d-flex align-items-center justify-content-center px-3">
	<div class="login-card shadow-sm">
		<div class="mb-4 text-center">
			<h2 class="mb-2">Iniciar sesion</h2>
			<p class="text-muted mb-0">Ingresa con tus credenciales para continuar.</p>
		</div>

		<form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
			<div class="mb-3">
				<label class="form-label" for="username">Usuario</label>
				<input
					class="form-control"
					id="username"
					name="username"
					[(ngModel)]="username"
					required
					autocomplete="username"
					placeholder="Ej. Morpho"
				/>
			</div>

			<div class="mb-3">
				<label class="form-label" for="password">Contrasena</label>
				<input
					class="form-control"
					id="password"
					name="password"
					[(ngModel)]="password"
					required
					type="password"
					autocomplete="current-password"
					placeholder="Ingresa tu contrasena"
				/>
			</div>

			@if (errorMessage) {
				<div class="alert alert-danger py-2 px-3 mb-3" role="alert">
					{{ errorMessage }}
				</div>
			}

			<button class="btn login-btn w-100" type="submit" [disabled]="loginForm.invalid || isSubmitting">
				Ingresar
			</button>
		</form>
	</div>
</section>
